<html>
<script>
    "use strict";
function unique(arr) {
    return arr.filter((item, index) => {
        return arr.indexOf(item) === index;
    });
}

let strings = ["Hare", "Krishna", "Hare", "Krishna",
    "Krishna", "Krishna", "Hare", "Hare", ":-O"
];

alert(unique(strings)); // Hare,Krishna,:-O
</script
</html>
