<html>
<script>
    "use strict";
    function Calculator(){
        this.methods = {
            "-": (a,b) => a-b,
            "+": (a,b) => a+b,
        }
        this.calculate = function(str){
            let split = str.split(" ");
            let a = +split[0];
            let op = split[1];
            let b = +split[2];
            if (!this.methods[op]){
                return ;
            }
            return this.methods[op](a,b);
            }

    this.addMethod = function(name, func){
        this.methods[name] = func;
    };
}
let calc = new Calculator;  
alert( calc.calculate("3 + 7") );

</script>
</html>
